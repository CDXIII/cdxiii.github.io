<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工作资料文件传输助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 6.5rem 16px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .info-box {
            margin-bottom: 24px;
        }

        .title {
            font-size: 2.4rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 14px;
            letter-spacing: -0.3px;
            line-height: 1.3;
            text-align: center;
        }

        .description {
            font-size: 1.05rem;
            font-weight: 400;
            color: #cdcdcd;
            line-height: 1.5;
            background: #1e1e1e;
            padding: 16px 18px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .description p {
            margin: 8px 0;
        }

        .description a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .description a:active {
            opacity: 0.8;
        }

        .lower-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
        }

        .circle-btn {
            width: 25vw;
            height: 25vw;
            max-width: 140px;
            max-height: 140px;
            background: linear-gradient(145deg, #3b82f6, #1e40af);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(59,130,246,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            margin: 20px auto;
        }

        .circle-btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 12px rgba(59,130,246,0.4);
        }

        .circle-text {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
            padding: 0 6px;
        }

        .file-panel {
            background: #121212;
            border-radius: 32px;
            padding: 20px 18px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #2c2c2c;
            transition: all 0.2s ease;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 12px;
        }

        .file-count {
            font-size: 0.85rem;
            font-weight: 500;
            color: #bbbbbb;
            background: #1e1e2a;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .secondary-btn {
            background: #2a2a2a;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #f0f0f0;
            cursor: pointer;
            transition: 0.1s;
        }

        .secondary-btn:active {
            background: #3a3a3a;
            transform: scale(0.97);
        }

        .clear-btn {
            color: #ff9f8f;
            background: #2a1e1c;
        }

        .clear-btn:active {
            background: #3e2a28;
        }

        .file-list {
            list-style: none;
            margin: 12px 0 8px;
            max-height: 420px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-radius: 20px;
            border: 1px solid #2c2c2c;
            transition: background 0.1s;
            flex-wrap: wrap;
            gap: 8px;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #e5e5e5;
            flex: 1;
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .copy-name-btn {
            background-color: #4b5563;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .copy-name-btn:active {
            background-color: #374151;
            transform: scale(0.96);
        }

        .download-btn {
            background-color: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .download-btn:active {
            background-color: #2563eb;
            transform: scale(0.96);
        }

        .add-more {
            margin-top: 20px;
            text-align: center;
        }

        .add-more-btn {
            background: #2a2a2a;
            border: 1px solid #3e3e3e;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b0d4ff;
            width: 100%;
            cursor: pointer;
            transition: 0.1s;
        }

        .add-more-btn:active {
            background: #353535;
            transform: scale(0.98);
        }

        .empty-placeholder {
            text-align: center;
            color: #7e7e8c;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        @media (max-width: 450px) {
            .copy-name-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            .download-btn {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
            .file-name {
                font-size: 0.8rem;
            }
            .circle-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="info-box">
        <div class="title">工作资料文件传输助手</div>
        <div class="description">
            <p>使用说明：</p>
            <p>1.点击「查看文件」，会跳转到Android原生文件管理；</p>
            <p>2.在文件管理中点击「个人」，可以查看主空间最近的文件，也可以点击左上角的≡通过其他应用选择文件；</p>
            <p>3.选择后文件将存储至浏览器缓存，点击「下载」可保存到本地；</p>
            <p>4.本页面没有任何联网功能，仅在本地运行，因此上传和下载文件几乎没有延迟；</p>
            <p>5.点击<a href="https://pan.quark.cn/s/2af5e5386013" target="_blank" rel="noopener noreferrer">链接</a>下载本页面的Html文件，无需联网也能传文件。了解更多</p>
        </div>
    </div>

    <div class="lower-section" id="lowerSection">
        <div id="circleContainer" class="circle-btn">
            <span class="circle-text">查看文件</span>
        </div>
        <div id="fileListContainer" style="display: none; width: 100%;">
            <div class="file-panel">
                <div class="file-header">
                    <span class="file-count" id="fileCount">0个文件</span>
                    <div class="action-buttons">
                        <button class="secondary-btn clear-btn" id="clearAllBtn">清空</button>
                    </div>
                </div>
                <div id="fileListContent">
                    <div class="empty-placeholder">暂无文件，点击添加</div>
                </div>
                <div class="add-more">
                    <button class="add-more-btn" id="addMoreBtn">+ 添加更多文件</button>
                </div>
            </div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" multiple />

<script>
    (function() {
        let cachedFiles = [];

        const circleContainer = document.getElementById('circleContainer');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileInput = document.getElementById('fileInput');
        const fileListContent = document.getElementById('fileListContent');
        const fileCountSpan = document.getElementById('fileCount');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const addMoreBtn = document.getElementById('addMoreBtn');

        function toggleView() {
            if (cachedFiles.length > 0) {
                circleContainer.style.display = 'none';
                fileListContainer.style.display = 'block';
            } else {
                circleContainer.style.display = 'flex';
                fileListContainer.style.display = 'none';
            }
        }

        function downloadFile(file) {
            if (!file) return;
            try {
                const blobUrl = URL.createObjectURL(file);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = file.name || 'download';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 150);
            } catch (err) {
                console.error('下载失败', err);
                alert('下载失败，请重试');
            }
        }

        async function copyFileName(file) {
            if (!file || !file.name) return;
            const fileName = file.name;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(fileName);
                    showToast(`✅ 已复制: ${fileName}`);
                    return;
                } catch (err) {
                    console.warn('Clipboard API 失败，尝试降级方案', err);
                }
            }
            try {
                const textarea = document.createElement('textarea');
                textarea.value = fileName;
                textarea.style.position = 'fixed';
                textarea.style.top = '-1000px';
                textarea.style.left = '-1000px';
                document.body.appendChild(textarea);
                textarea.select();
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                if (success) {
                    showToast(`✅ 已复制: ${fileName}`);
                } else {
                    throw new Error('execCommand 复制失败');
                }
            } catch (err) {
                console.error('复制失败', err);
                alert('复制失败，请手动复制文件名');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = 'rgba(0,0,0,0.85)';
            toast.style.color = 'white';
            toast.style.padding = '8px 18px';
            toast.style.borderRadius = '40px';
            toast.style.fontSize = '14px';
            toast.style.zIndex = '9999';
            toast.style.whiteSpace = 'nowrap';
            toast.style.maxWidth = '90%';
            toast.style.overflow = 'hidden';
            toast.style.textOverflow = 'ellipsis';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function renderFileList() {
            const len = cachedFiles.length;
            fileCountSpan.innerText = `${len} 个文件`;

            if (len === 0) {
                fileListContent.innerHTML = `<div class="empty-placeholder">📭 暂无文件，点击「添加更多文件」或圆形按钮选择文件</div>`;
                toggleView();
                return;
            }

            let itemsHtml = `<ul class="file-list" id="dynamicFileList">`;
            cachedFiles.forEach((file, idx) => {
                let safeName = (file.name || '未命名文件').replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
                itemsHtml += `
                    <li class="file-item" data-index="${idx}">
                        <span class="file-name" title="${safeName}">${safeName}</span>
                        <div class="btn-group">
                            <button class="copy-name-btn" data-index="${idx}" data-action="copy">复制文件名</button>
                            <button class="download-btn" data-index="${idx}" data-action="download">下载</button>
                        </div>
                    </li>
                `;
            });
            itemsHtml += `</ul>`;
            fileListContent.innerHTML = itemsHtml;
            toggleView();
        }

        function appendFiles(newFiles) {
            if (!newFiles || newFiles.length === 0) return false;
            const validFiles = Array.from(newFiles);
            if (validFiles.length === 0) return false;
            cachedFiles.push(...validFiles);
            renderFileList();
            return true;
        }

        function clearAllFiles() {
            if (cachedFiles.length === 0) return;
            cachedFiles = [];
            renderFileList();
        }

        function setupDelegation() {
            fileListContent.addEventListener('click', (e) => {
                const copyBtn = e.target.closest('.copy-name-btn');
                if (copyBtn && copyBtn.dataset.index !== undefined) {
                    const idx = parseInt(copyBtn.dataset.index, 10);
                    if (!isNaN(idx) && idx >= 0 && idx < cachedFiles.length) {
                        e.stopPropagation();
                        copyFileName(cachedFiles[idx]);
                    }
                    return;
                }

                const downloadBtn = e.target.closest('.download-btn');
                if (downloadBtn && downloadBtn.dataset.index !== undefined) {
                    const idx = parseInt(downloadBtn.dataset.index, 10);
                    if (!isNaN(idx) && idx >= 0 && idx < cachedFiles.length) {
                        e.stopPropagation();
                        downloadFile(cachedFiles[idx]);
                    }
                    return;
                }
            });
        }

        function triggerFilePicker() {
            fileInput.value = '';
            fileInput.click();
        }

        function bindEvents() {
            if (circleContainer) circleContainer.addEventListener('click', triggerFilePicker);
            if (addMoreBtn) addMoreBtn.addEventListener('click', triggerFilePicker);
            if (clearAllBtn) {
                clearAllBtn.addEventListener('click', () => {
                    if (cachedFiles.length > 0) {
                        if (confirm(`确定要清空全部 ${cachedFiles.length} 个文件吗？`)) clearAllFiles();
                    } else {
                        alert('当前没有文件可清空');
                    }
                });
            }
            fileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files && files.length) appendFiles(files);
                fileInput.value = '';
            });
        }

        function init() {
            cachedFiles = [];
            renderFileList();
            bindEvents();
            setupDelegation();
        }

        init();
    })();
</script>
</body>
</html>
